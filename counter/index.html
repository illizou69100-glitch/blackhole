<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Counter</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Counter">
  <link rel="apple-touch-icon" href="../icon-180.png">
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #1c1c1e;
      --card2: #2c2c2e;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-dim: #777;
    }

    html, body {
      height: 100%; height: -webkit-fill-available;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ─── Views ─── */
    .view {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      will-change: transform, opacity;
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s;
    }
    .view.gone {
      opacity: 0;
      transform: translateX(30px);
      pointer-events: none;
    }

    /* ─── LIST VIEW ─── */
    #listView {
      background: var(--bg);
      padding-top: max(env(safe-area-inset-top), 52px);
      padding-bottom: max(env(safe-area-inset-bottom), 20px);
    }

    .list-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 20px 18px;
    }
    .list-hdr h1 { font-size: 28px; font-weight: 800; }

    .grid {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 0 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-content: start;
    }

    .counter-card {
      border-radius: 22px;
      padding: 18px 16px 14px;
      min-height: 148px;
      display: flex; flex-direction: column; justify-content: space-between;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
      position: relative; overflow: hidden;
    }
    .counter-card:active { transform: scale(0.94); }

    .card-name {
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.2px;
    }
    .card-val {
      font-size: 52px; font-weight: 900;
      color: #fff; line-height: 1;
      letter-spacing: -1px;
    }
    .card-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
    }

    /* Goal ribbon */
    .card-ribbon {
      position: absolute; top: 12px; right: -18px;
      background: rgba(255,255,255,0.2);
      font-size: 9px; font-weight: 700;
      color: rgba(255,255,255,0.9);
      padding: 3px 22px 3px 8px;
      letter-spacing: 0.5px;
      transform: rotate(35deg);
    }

    /* Empty state */
    .empty {
      grid-column: span 2;
      text-align: center;
      color: var(--text-dim);
      padding: 80px 30px 40px;
      font-size: 15px;
      line-height: 1.6;
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 20px);
      right: 20px;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: var(--text); color: var(--bg);
      border: none; font-size: 30px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
      z-index: 5;
    }
    .fab:active { transform: scale(0.88); }

    /* ─── COUNTER VIEW ─── */
    #counterView {
      background: #7C3AED; /* overridden per counter */
    }

    .cv-hdr {
      padding: max(env(safe-area-inset-top), 52px) 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .hdr-btn {
      background: rgba(0,0,0,0.18);
      border: none; color: #fff;
      width: 40px; height: 40px; border-radius: 12px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .hdr-btn:active { background: rgba(0,0,0,0.3); }
    .hdr-btn svg { width: 20px; height: 20px; }

    .cv-title {
      font-size: 17px; font-weight: 700;
      color: rgba(255,255,255,0.92); text-align: center;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Tap zone */
    .tap-zone {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      position: relative; gap: 12px;
    }

    .big-num {
      font-size: clamp(100px, 30vw, 168px);
      font-weight: 900;
      color: rgba(255,255,255,0.95);
      line-height: 1; letter-spacing: -4px;
      will-change: transform;
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1);
    }
    .big-num.up   { transform: scale(1.14); }
    .big-num.down { transform: scale(0.88); }

    .hint-text {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
      letter-spacing: 0.3px;
    }

    /* Goal banner */
    .goal-banner {
      position: absolute;
      bottom: 0;
      left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.25);
      border-radius: 16px;
      padding: 10px 22px;
      font-size: 15px; font-weight: 700; color: #fff;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, bottom 0.3s;
      white-space: nowrap;
    }
    .goal-banner.show { opacity: 1; bottom: 16px; }

    /* Progress */
    .cv-progress {
      padding: 0 22px max(calc(env(safe-area-inset-bottom) + 22px), 40px);
    }
    .prog-track {
      height: 5px; background: rgba(0,0,0,0.2);
      border-radius: 3px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; background: rgba(255,255,255,0.75);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .prog-label {
      margin-top: 7px; font-size: 11px;
      color: rgba(255,255,255,0.45); text-align: right;
    }

    /* ─── SHEET ─── */
    #backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 50; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #backdrop.on { opacity: 1; pointer-events: all; }

    #sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1c1c1e;
      border-radius: 22px 22px 0 0;
      padding: 10px 18px max(env(safe-area-inset-bottom), 24px);
      z-index: 51;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      max-height: 90vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #sheet.on { transform: translateY(0); }

    .handle {
      width: 36px; height: 4px; background: #3a3a3c;
      border-radius: 2px; margin: 0 auto 18px;
    }

    .sheet-hdr {
      font-size: 18px; font-weight: 700; margin-bottom: 18px;
    }

    .field { margin-bottom: 13px; }
    .field label {
      display: block; font-size: 10px;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-dim); margin-bottom: 6px;
    }
    .field input {
      width: 100%; background: #2c2c2e; border: none;
      border-radius: 11px; color: var(--text);
      font-size: 16px; padding: 12px 14px;
      font-family: inherit; outline: none;
      -webkit-appearance: none;
    }
    .field input:focus { background: #3a3a3c; }

    .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .colors-grid {
      display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px;
      margin-bottom: 18px;
    }
    .cdot {
      aspect-ratio: 1; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cdot:active { transform: scale(0.85); }
    .cdot.sel { border-color: #fff; transform: scale(1.18); }

    .actions { display: flex; flex-direction: column; gap: 9px; margin-top: 6px; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 13px;
      font-size: 16px; font-weight: 600; font-family: inherit;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn-save { background: var(--text); color: var(--bg); }
    .btn-reset { background: #2c2c2e; color: var(--text); }
    .btn-del   { background: #2c2c2e; color: #f87171; }
  </style>
</head>
<body>

<!-- LIST VIEW -->
<div class="view" id="listView">
  <div class="list-hdr">
    <h1>Compteurs</h1>
  </div>
  <div class="grid" id="grid"></div>
  <button class="fab" id="addBtn" aria-label="Ajouter">+</button>
</div>

<!-- COUNTER VIEW -->
<div class="view gone" id="counterView">
  <div class="cv-hdr">
    <button class="hdr-btn" id="backBtn" aria-label="Retour">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <span class="cv-title" id="cvTitle"></span>
    <button class="hdr-btn" id="editBtn" aria-label="Paramètres">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="tap-zone" id="tapZone">
    <span class="big-num" id="bigNum">0</span>
    <span class="hint-text">Appuie pour +1 · Maintiens pour −1</span>
    <div class="goal-banner" id="goalBanner">🎯 Objectif atteint !</div>
  </div>

  <div class="cv-progress" id="cvProgress" style="display:none">
    <div class="prog-track">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>
    <div class="prog-label" id="progLabel"></div>
  </div>
</div>

<!-- BACKDROP + SHEET -->
<div id="backdrop"></div>
<div id="sheet">
  <div class="handle"></div>
  <div class="sheet-hdr" id="sheetHdr">Nouveau compteur</div>

  <div class="field">
    <label>Titre</label>
    <input type="text" id="fTitle" placeholder="ex : Pompes" maxlength="32">
  </div>
  <div class="fields-row">
    <div class="field">
      <label>Valeur de départ</label>
      <input type="number" id="fStart" value="0">
    </div>
    <div class="field">
      <label>Pas (+/-)</label>
      <input type="number" id="fStep" value="1" min="1">
    </div>
  </div>
  <div class="field">
    <label>Objectif (optionnel)</label>
    <input type="number" id="fGoal" placeholder="ex : 100">
  </div>
  <div class="field">
    <label>Couleur</label>
    <div class="colors-grid" id="colorGrid"></div>
  </div>

  <div class="actions">
    <button class="btn btn-save" id="saveBtn">Enregistrer</button>
    <button class="btn btn-reset" id="resetBtn" style="display:none">Réinitialiser</button>
    <button class="btn btn-del"   id="deleteBtn" style="display:none">Supprimer</button>
  </div>
</div>

<script>
/* ── Palette ── */
const COLORS = ['#7C3AED','#2563EB','#059669','#DC2626','#EA580C','#DB2777','#0891B2','#6B7280'];

/* ── State ── */
let data = JSON.parse(localStorage.getItem('ctr2') || 'null');
if (!data) {
  data = [mkCounter('Pompes', '#7C3AED'), mkCounter('Escaliers', '#2563EB')];
  persist();
}
let activeId = null;
let sheetMode = 'new';
let editId    = null;
let pickedColor = COLORS[0];

function mkCounter(title, color) {
  return { id: uid(), title, value: 0, start: 0, step: 1, goal: null, color };
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function persist() { localStorage.setItem('ctr2', JSON.stringify(data)); }
function byId(id)  { return data.find(c => c.id === id); }
function vib(p)    { if (navigator.vibrate) navigator.vibrate(p); }
function esc(s)    { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

/* ── Elements ── */
const listView  = document.getElementById('listView');
const cntView   = document.getElementById('counterView');
const grid      = document.getElementById('grid');
const addBtn    = document.getElementById('addBtn');
const backBtn   = document.getElementById('backBtn');
const editBtn   = document.getElementById('editBtn');
const cvTitle   = document.getElementById('cvTitle');
const bigNum    = document.getElementById('bigNum');
const tapZone   = document.getElementById('tapZone');
const goalBnr   = document.getElementById('goalBanner');
const cvProg    = document.getElementById('cvProgress');
const progFill  = document.getElementById('progFill');
const progLabel = document.getElementById('progLabel');
const backdrop  = document.getElementById('backdrop');
const sheet     = document.getElementById('sheet');
const sheetHdr  = document.getElementById('sheetHdr');
const fTitle    = document.getElementById('fTitle');
const fStart    = document.getElementById('fStart');
const fStep     = document.getElementById('fStep');
const fGoal     = document.getElementById('fGoal');
const saveBtn   = document.getElementById('saveBtn');
const resetBtn  = document.getElementById('resetBtn');
const deleteBtn = document.getElementById('deleteBtn');
const colorGrid = document.getElementById('colorGrid');

/* ── Color picker ── */
COLORS.forEach(c => {
  const d = document.createElement('div');
  d.className = 'cdot'; d.style.background = c;
  d.addEventListener('click', () => pickColor(c));
  colorGrid.appendChild(d);
});

function pickColor(c) {
  pickedColor = c;
  colorGrid.querySelectorAll('.cdot').forEach((d, i) => d.classList.toggle('sel', COLORS[i] === c));
}
pickColor(COLORS[0]);

/* ── Render list ── */
function renderList() {
  grid.innerHTML = '';
  if (!data.length) {
    grid.innerHTML = '<div class="empty">Appuie sur <strong>+</strong> pour créer ton premier compteur</div>';
    return;
  }
  data.forEach(c => {
    const el = document.createElement('div');
    el.className = 'counter-card';
    el.style.background = c.color;
    const pct = c.goal != null && c.goal !== c.start
      ? Math.min(100, Math.max(0, Math.round((c.value - c.start) / (c.goal - c.start) * 100)))
      : null;
    el.innerHTML = `
      <span class="card-name">${esc(c.title)}</span>
      <span class="card-val">${c.value}</span>
      ${pct !== null ? `<span class="card-meta">${pct}% · /${c.goal}</span>` : ''}
      ${pct === 100 ? '<div class="card-ribbon">ATTEINT</div>' : ''}
    `;
    el.addEventListener('click', () => openCounter(c.id));
    grid.appendChild(el);
  });
}

/* ── Open counter ── */
function openCounter(id) {
  activeId = id;
  const c = byId(id);
  cntView.style.background = c.color;
  cvTitle.textContent = c.title;
  refreshNum(c);
  refreshProg(c);
  listView.classList.add('gone');
  cntView.classList.remove('gone');
}

backBtn.addEventListener('click', () => {
  cntView.classList.add('gone');
  listView.classList.remove('gone');
  activeId = null;
  renderList();
});

/* ── Number display ── */
function refreshNum(c) { bigNum.textContent = c.value; }

function bumpNum(dir) {
  const cls = dir > 0 ? 'up' : 'down';
  bigNum.classList.remove('up','down');
  void bigNum.offsetWidth;
  bigNum.classList.add(cls);
  setTimeout(() => bigNum.classList.remove(cls), 200);
}

/* ── Progress ── */
function refreshProg(c) {
  if (c.goal == null) { cvProg.style.display = 'none'; return; }
  cvProg.style.display = 'block';
  const range = c.goal - c.start;
  const pct = range > 0 ? Math.min(100, Math.max(0, (c.value - c.start) / range * 100)) : 0;
  progFill.style.width = pct.toFixed(1) + '%';
  progLabel.textContent = `${c.value} / ${c.goal}`;
}

/* ── Inc / Dec ── */
function doInc() {
  const c = byId(activeId); if (!c) return;
  c.value += c.step;
  persist();
  refreshNum(c); bumpNum(1); refreshProg(c);
  vib(10);
  if (c.goal != null && c.value >= c.goal) flashGoal();
}

function doDec() {
  const c = byId(activeId); if (!c) return;
  c.value -= c.step;
  persist();
  refreshNum(c); bumpNum(-1); refreshProg(c);
  vib([8, 20, 8]);
}

function flashGoal() {
  goalBnr.classList.add('show');
  vib([40,25,40,25,80]);
  setTimeout(() => goalBnr.classList.remove('show'), 2800);
}

/* ── Touch: tap / long-press / swipe ── */
let lpTimer = null, lpDone = false, touchY0 = 0, wasSwiping = false;

tapZone.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  touchY0 = e.touches[0].clientY;
  wasSwiping = false; lpDone = false;
  lpTimer = setTimeout(() => { lpDone = true; doDec(); }, 460);
}, { passive: true });

tapZone.addEventListener('touchmove', e => {
  if (Math.abs(e.touches[0].clientY - touchY0) > 14) {
    clearTimeout(lpTimer); wasSwiping = true;
  }
}, { passive: true });

tapZone.addEventListener('touchend', e => {
  clearTimeout(lpTimer);
  if (lpDone) return;
  if (wasSwiping) {
    const dy = e.changedTouches[0].clientY - touchY0;
    if (dy < -50) doInc();
    else if (dy > 50) doDec();
    return;
  }
  doInc();
});

/* Prevent scroll on tap zone */
tapZone.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

/* ── Sheet ── */
function openSheet(mode, id) {
  sheetMode = mode; editId = id || null;
  if (mode === 'new') {
    sheetHdr.textContent = 'Nouveau compteur';
    fTitle.value = ''; fStart.value = '0'; fStep.value = '1'; fGoal.value = '';
    pickColor(COLORS[0]);
    resetBtn.style.display = 'none';
    deleteBtn.style.display = 'none';
  } else {
    const c = byId(id);
    sheetHdr.textContent = 'Modifier';
    fTitle.value = c.title; fStart.value = c.start;
    fStep.value = c.step; fGoal.value = c.goal ?? '';
    pickColor(c.color);
    resetBtn.style.display = 'block';
    deleteBtn.style.display = 'block';
  }
  backdrop.classList.add('on'); sheet.classList.add('on');
  setTimeout(() => fTitle.focus(), 380);
}

function closeSheet() {
  backdrop.classList.remove('on'); sheet.classList.remove('on');
}

backdrop.addEventListener('click', closeSheet);
addBtn.addEventListener('click', () => openSheet('new'));
editBtn.addEventListener('click', () => activeId && openSheet('edit', activeId));

saveBtn.addEventListener('click', () => {
  const title = fTitle.value.trim() || 'Compteur';
  const start = parseFloat(fStart.value) || 0;
  const step  = Math.max(1, parseFloat(fStep.value) || 1);
  const goal  = fGoal.value.trim() !== '' ? parseFloat(fGoal.value) : null;

  if (sheetMode === 'new') {
    const c = { id: uid(), title, value: start, start, step, goal, color: pickedColor };
    data.push(c); persist();
    closeSheet(); renderList(); openCounter(c.id);
  } else {
    const c = byId(editId);
    c.title = title; c.start = start; c.step = step; c.goal = goal; c.color = pickedColor;
    persist(); closeSheet(); renderList();
    if (activeId === editId) {
      cvTitle.textContent = c.title;
      cntView.style.background = c.color;
      refreshProg(c);
    }
  }
});

resetBtn.addEventListener('click', () => {
  const c = byId(editId);
  if (c) { c.value = c.start; persist(); }
  closeSheet(); renderList();
  if (activeId === editId) { refreshNum(byId(editId)); refreshProg(byId(editId)); }
});

deleteBtn.addEventListener('click', () => {
  data = data.filter(c => c.id !== editId); persist();
  closeSheet(); renderList();
  if (activeId === editId) {
    cntView.classList.add('gone');
    listView.classList.remove('gone');
    activeId = null;
  }
});

/* ── Init ── */
renderList();
</script>
</body>
</html>
